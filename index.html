<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Housing Market Analysis Dashboard</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#f5f6fa;
    text-align:center;
}

header{
    padding:25px;
}

h1{
    margin:0;
    font-size:32px;
}

p{
    color:#555;
}

.dashboard-container{
    width:95%;
    max-width:1400px;
    margin:40px auto;
}
</style>
</head>

<body>

<header>
<h1>Housing Market Analysis Dashboard</h1>
<p>Interactive data visualization built using Tableau</p>
</header>

<div class="dashboard-container">

<div class='tableauPlaceholder' id='viz1' style='position: relative; width:100%;'>
<object class='tableauViz' style='display:none; width:100%;'>
<param name='host_url' value='https://public.tableau.com/' />
<param name='embed_code_version' value='3' />
<param name='name' value='Housing_Market_17730431289560/Story1' />
<param name='tabs' value='no' />
<param name='toolbar' value='yes' />
</object>
</div>

</div>

<script>
var divElement = document.getElementById('viz1');
var vizElement = divElement.getElementsByTagName('object')[0];

vizElement.style.width = '100%';
vizElement.style.height = '850px';

var scriptElement = document.createElement('script');
scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';

vizElement.parentNode.insertBefore(scriptElement, vizElement);
</script>

</body>
</html>
